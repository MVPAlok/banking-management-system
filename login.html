<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Luminous Ledger</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="js/store.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#10141a",
                        "surface-variant": "#31353c",
                        "primary": "#adc6ff",
                        "on-surface": "#dfe2eb",
                        "on-surface-variant": "#c1c6d7",
                        "outline": "#8b90a0",
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            color: #dfe2eb;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .primary-button {
            background: linear-gradient(135deg, #4b8eff 0%, #00f4fe 100%);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .primary-button:hover {
            box-shadow: 0 0 20px rgba(75, 142, 255, 0.4);
            transform: scale(1.02);
        }

        .glow-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(75, 142, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 244, 254, 0.1) 0%, transparent 40%);
            filter: blur(80px);
        }

        .primary-gradient-text {
            background: linear-gradient(to right, #adc6ff, #00f4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="font-body-md p-4">
    <div class="glow-mesh"></div>
    
    <!-- Top Left Home Link -->
    <a href="index.html" class="absolute top-8 left-8 flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors">
        <span class="material-symbols-outlined">arrow_back</span>
        <span>Back to Home</span>
    </a>

    <div class="glass-card rounded-2xl w-full max-w-md p-8 sm:p-10 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/10 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-[#00f4fe]/10 rounded-full blur-2xl"></div>
        
        <div class="relative z-10">
            <div class="flex justify-center mb-6">
                <!-- Logo Placeholer -->
                <div class="w-12 h-12 rounded-lg bg-surface-variant flex items-center justify-center border border-white/10">
                    <span class="material-symbols-outlined text-primary text-3xl">account_balance</span>
                </div>
            </div>
            
            <h1 class="text-3xl font-semibold text-center mb-2">Welcome Back</h1>
            <p class="text-on-surface-variant text-center mb-8">Enter your details to access your account.</p>

            <form id="loginForm" class="space-y-5">
                <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 p-3 rounded-lg text-sm text-center">
                    Invalid credentials. Use a valid email format.
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2" for="email">Email address</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">mail</span>
                        <input type="email" id="email" required placeholder="sarah.j@example.com" class="w-full bg-surface-variant/50 border border-outline/30 rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder-outline focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium" for="password">Password</label>
                        <a href="#" class="text-xs text-primary hover:text-[#00f4fe] transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock</span>
                        <input type="password" id="password" required placeholder="••••••••" class="w-full bg-surface-variant/50 border border-outline/30 rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder-outline focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none">
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember" class="rounded bg-surface-variant border-outline/30 text-primary focus:ring-primary focus:ring-offset-surface">
                    <label for="remember" class="text-sm text-on-surface-variant">Remember me for 30 days</label>
                </div>

                <button type="submit" class="w-full primary-button text-[#002021] font-semibold py-3 rounded-lg mt-4 flex items-center justify-center gap-2">
                    Sign In
                    <span class="material-symbols-outlined text-sm">login</span>
                </button>
            </form>

            <p class="text-center text-sm text-on-surface-variant mt-8">
                Don't have an account? 
                <a href="#" class="text-primary hover:text-[#00f4fe] font-medium transition-colors">Open Account</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const success = Store.login(email, password);
            if (success) {
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });

        // Redirect if already logged in
        if (Store.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
